<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f17;
      color: #e0e0e6;
      padding: 16px;
    }

    h2 {
      font-size: 1rem;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #7c5cfc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 12px;
      padding: 8px;
      background: #1a1a24;
      border-radius: 6px;
      min-height: 40px;
    }

    .status.success { color: #4ade80; background: #1a2a1a; }
    .status.error { color: #f87171; background: #2a1515; }

    .preview {
      font-size: 0.7rem;
      color: #666;
      margin-bottom: 12px;
      max-height: 150px;
      overflow-y: auto;
      background: #1a1a24;
      border-radius: 6px;
      padding: 8px;
    }

    .preview-item {
      margin-bottom: 4px;
    }

    .preview-item strong { color: #c084fc; }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .field input[type="file"] {
      width: 100%;
      font-size: 0.75rem;
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c5cfc, #9b6dff);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-read {
      background: #1a1a2e;
      border: 1px solid #2a2a3a;
      color: #c084fc;
    }

    .btn-read:hover { border-color: #7c5cfc; }

    .step-label {
      font-size: 0.7rem;
      color: #555;
      margin-bottom: 6px;
    }

    .divider {
      border: none;
      border-top: 1px solid #1e1e2a;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <h2>Store Processor</h2>

  <div class="step-label">Step 1: Read data from clipboard</div>
  <button class="btn btn-read" id="btnRead">Read JSON from Clipboard</button>

  <div class="status" id="status">Click "Read JSON" to load store data from clipboard</div>

  <div class="preview" id="preview" style="display:none"></div>

  <hr class="divider">

  <div id="imageStatus" class="status" style="display:none"></div>

  <div id="imageSection">
    <div class="step-label">Step 2: Select processed images (optional if loaded from clipboard)</div>
    <div class="field">
      <label>Images (downloaded from Store Processor)</label>
      <input type="file" id="imageFiles" accept="image/*" multiple>
    </div>
  </div>

  <hr class="divider">

  <div class="step-label">Step 3: Fill the admin form</div>
  <button class="btn btn-primary" id="btnFill" disabled>Fill Admin Form</button>

  <script src="popup.js"></script>
</body>
</html>
